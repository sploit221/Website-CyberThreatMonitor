<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Monitor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* Tema Dasar Modern */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1120; /* Warna biru malam gelap */
            color: #94a3b8; /* Warna teks sekunder */
        }
        
        h1, h2, h3, h4, h5, h6 {
            color: #f8fafc; /* Warna teks utama lebih terang */
            font-weight: 600;
        }

        /* Kustomisasi Navbar */
        .navbar {
            background-color: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(10px); /* Efek kaca / glassmorphism */
            border-bottom: 1px solid #1e293b;
        }
        .navbar-brand {
            font-weight: 700;
            color: #10b981 !important; /* Warna neon hijau */
            letter-spacing: 1px;
        }

        /* Kustomisasi Card */
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
        }

        /* Warna Neon Kustom */
        .text-neon { color: #10b981; }
        .border-neon { border-color: #10b981 !important; }
        
        /* Tombol Modern */
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        .btn-outline-success {
            color: #10b981;
            border-color: #10b981;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-outline-success:hover {
            background-color: #10b981;
            color: #0b1120;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-3">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa-solid fa-shield-halved me-2"></i>CyberMonitor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="target" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fa-solid fa-house me-1"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="fa-solid fa-chart-line me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/predict"><i class="fa-solid fa-microchip me-1"></i> Predict</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
